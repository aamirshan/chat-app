<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary-color: #2572E5;
            --secondary-color: #1C5BB5;
            --background-color: #F0F2F5;
            --panel-background: #FFFFFF;
            --text-color: #333333;
            --light-text-color: #FFFFFF;
            --border-color: #DDDFE1;
            --my-message-bg: #D9FDD3;
            --their-message-bg: #FFFFFF;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background-color);
        }

        .chat-container {
            display: flex;
            height: 100vh;
        }

        .conversations-panel {
            flex: 1;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            background-color: var(--panel-background);
        }

        .panel-header {
            padding: 1rem;
            background-color: var(--primary-color);
            color: var(--light-text-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h2 {
            margin: 0;
            font-size: 1.2rem;
        }

        #logout {
            background: none;
            border: none;
            color: var(--light-text-color);
            font-size: 1.2rem;
            cursor: pointer;
        }

        #conversations {
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow-y: auto;
            flex-grow: 1;
        }

        #conversations li {
            padding: 1rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
        }

        #conversations li:hover {
            background-color: var(--background-color);
        }

        .chat-panel {
            flex: 3;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 1rem;
            background-color: var(--panel-background);
            border-bottom: 1px solid var(--border-color);
        }

        .chat-header h3 {
            margin: 0;
        }

        #messages {
            list-style-type: none;
            margin: 0;
            padding: 1rem;
            overflow-y: auto;
            flex-grow: 1;
        }

        #messages li {
            padding: 0.5rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 10px;
            max-width: 60%;
            word-wrap: break-word;
        }

        #messages li.my-message {
            background-color: var(--my-message-bg);
            align-self: flex-end;
            margin-left: auto;
        }

        #messages li.their-message {
            background-color: var(--their-message-bg);
            align-self: flex-start;
            margin-right: auto;
        }


        #form {
            background: var(--background-color);
            padding: 0.5rem 1rem;
            display: flex;
            height: 3.5rem;
            box-sizing: border-box;
        }

        #input {
            border: 1px solid var(--border-color);
            padding: 0 1rem;
            flex-grow: 1;
            border-radius: 2rem;
            margin: 0.25rem;
        }

        #input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        #form button {
            background: var(--primary-color);
            border: none;
            padding: 0 1.5rem;
            margin: 0.25rem;
            border-radius: 2rem;
            outline: none;
            color: #fff;
            cursor: pointer;
            font-size: 1.2rem;
        }

        #form button:hover {
            background: var(--secondary-color);
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="conversations-panel">
            <div class="panel-header">
                <h2>Chats</h2>
                <button id="logout" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
            <ul id="conversations">
                <!-- Conversation list will be populated by JS -->
            </ul>
        </div>
        <div class="chat-panel">
            <div class="chat-header">
                <h3 id="chat-with">Select a conversation</h3>
            </div>
            <ul id="messages">
                <!-- Messages will be populated by JS -->
            </ul>
            <form id="form" action="">
                <input id="input" autocomplete="off" placeholder="Type a message..." /><button><i class="fas fa-paper-plane"></i></button>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login.html';
        }

        function parseJwt(token) {
            try {
                return JSON.parse(atob(token.split('.')[1]));
            } catch (e) {
                return null;
            }
        }

        const currentUserId = parseJwt(token).user.id;

        const socket = io({
            auth: { token }
        });

        // Element references
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messages = document.getElementById('messages');
        const logoutBtn = document.getElementById('logout');
        const conversationsList = document.getElementById('conversations');
        const chatWith = document.getElementById('chat-with');

        let currentRecipient = null;

        // Fetch and display users
        async function fetchUsers() {
            try {
                const response = await fetch('/api/users', {
                    headers: { 'x-auth-token': token }
                });
                if (!response.ok) throw new Error('Failed to fetch users');
                const users = await response.json();
                conversationsList.innerHTML = '';
                users.forEach(user => {
                    const item = document.createElement('li');
                    item.dataset.id = user.id;
                    item.textContent = user.username;
                    conversationsList.appendChild(item);
                });
            } catch (error) {
                console.error('Error fetching users:', error);
            }
        }

        function displayMessages(messageArray) {
            messages.innerHTML = '';
            messageArray.forEach(msg => {
                const item = document.createElement('li');
                item.textContent = msg.content;
                if (msg.sender._id.toString() === currentUserId.toString()) {
                    item.classList.add('my-message');
                } else {
                    item.classList.add('their-message');
                }
                messages.appendChild(item);
            });
            messages.scrollTop = messages.scrollHeight;
        }

        async function loadChatHistory(userId) {
            try {
                const response = await fetch(`/api/messages/${userId}`, {
                    headers: { 'x-auth-token': token }
                });
                if (!response.ok) throw new Error('Failed to fetch chat history');
                const history = await response.json();
                displayMessages(history);
            } catch (error) {
                console.error('Error loading chat history:', error);
            }
        }

        // Logout
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = '/login.html';
        });

        // Handle conversation selection
        conversationsList.addEventListener('click', (e) => {
            if (e.target && e.target.nodeName === 'LI') {
                currentRecipient = e.target.dataset.id;
                chatWith.textContent = `Chat with ${e.target.textContent}`;
                loadChatHistory(currentRecipient);
            }
        });

        // Send message
        form.addEventListener('submit', function (e) {
            e.preventDefault();
            if (input.value && currentRecipient) {
                const messageData = {
                    recipientId: currentRecipient,
                    content: input.value
                };
                socket.emit('chat message', messageData);
                input.value = '';
            }
        });

        // Receive message
        socket.on('chat message', function (msg) {
            // Only display message if it's part of the currently active chat
            const involved = [msg.sender._id.toString(), msg.recipient._id.toString()];
            if (currentRecipient && involved.includes(currentRecipient.toString()) && involved.includes(currentUserId.toString())) {
                const item = document.createElement('li');
                item.textContent = msg.content;
                if (msg.sender._id.toString() === currentUserId.toString()) {
                    item.classList.add('my-message');
                } else {
                    item.classList.add('their-message');
                }
                messages.appendChild(item);
                messages.scrollTop = messages.scrollHeight;
            }
        });

        // Initial load
        fetchUsers();

    </script>
</body>
</html>
